<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunoLoad</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1: #fb923c;
    --c2: #f97316;
    --c3: #ea580c;
    --c-glow: rgba(251,146,60,0.4);
    --c-glow2: rgba(234,88,12,0.12);
    --c-glow3: rgba(251,146,60,0.05);
    --c-ring1: rgba(251,146,60,0.15);
    --c-border: rgba(251,146,60,0.2);
    --c-border-focus: rgba(251,146,60,0.55);
    --c-shadow: rgba(251,146,60,0.3);
    --c-shadow2: rgba(251,146,60,0.55);
    --c-shadow3: rgba(251,146,60,0.15);
    --c-wv-played: rgba(251,146,60,0.75);
    --c-wv-active: #fb923c;
    --c-wv-glow: rgba(251,146,60,0.6);
    --c-btn-bg1: #fb923c;
    --c-btn-bg2: #ea580c;
    --c-progress1: #ea580c;
    --c-progress2: #fb923c;
    --c-play-bg: rgba(251,146,60,0.12);
    --c-play-border: rgba(251,146,60,0.3);
    --c-play-glow: rgba(251,146,60,0.35);
    --c-dl-border: rgba(251,146,60,0.25);
    --c-dl-text: #fb923c;
    --c-dl-bg: rgba(251,146,60,0.08);
    --c-dl-bg2: rgba(251,146,60,0.15);
    --c-card-border: rgba(251,146,60,0.18);
    --c-cover-bg: rgba(251,146,60,0.08);
    --c-cover-border: rgba(251,146,60,0.15);
    --c-sub: rgba(251,146,60,0.3);
    --c-source: rgba(251,146,60,0.5);
    --c-spin1: rgba(251,146,60,0.7);
    --c-spin2: rgba(251,146,60,0.3);
    transition: none;
  }

  body {
    background: #0a0602;
    font-family: 'Syne', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .glow-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 65% 55% at 15% 20%, var(--c-ring1) 0%, transparent 65%),
      radial-gradient(ellipse 50% 50% at 85% 80%, var(--c-glow2) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, var(--c-glow3) 0%, transparent 70%);
    animation: breathe 8s ease-in-out infinite alternate;
    pointer-events: none;
    transition: background 1.2s ease;
  }
  @keyframes breathe { 0% { opacity:.7; } 100% { opacity:1; } }

  canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ── COVER BLUR BG ─────────────────────────────────────────────────────── */
  .cover-blur {
    position: fixed; inset: 0; z-index: 0;
    background-size: cover;
    background-position: center;
    filter: blur(80px) brightness(0.18) saturate(1.4);
    opacity: 0;
    transition: opacity 1s ease, background-image 0.6s ease;
    pointer-events: none;
  }
  .cover-blur.show { opacity: 1; }

  .center {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    padding: 2rem;
    gap: 0;
    width: 100%;
    max-width: 520px;
  }

  /* wave */
  .wave {
    display: flex; align-items: center; gap: 3px;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s forwards;
  }
  .wave-bar {
    width: 3px; border-radius: 2px;
    background: linear-gradient(to top, var(--c3), var(--c1), #fed7aa);
    animation: waveAnim var(--d) ease-in-out infinite alternate;
    opacity: 0.7;
    transition: background 1.2s ease;
  }
  @keyframes waveAnim { from { transform:scaleY(0.15); } to { transform:scaleY(1); } }

  h1 {
    font-size: clamp(3.5rem, 12vw, 6.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.05em;
    margin-bottom: 0.6rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }
  h1 .suno { color: #fff; }
  h1 .load {
    background: linear-gradient(90deg, #fb923c, #f97316, #ea580c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200%;
    animation: gradShift 3s ease-in-out infinite alternate;
  }
  @keyframes gradShift { 0% { background-position:0%; } 100% { background-position:100%; } }

  .sub {
    font-family: 'Syne Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    margin-bottom: 3rem;
    max-width: 380px;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.6s 0.28s forwards;
  }

  /* form */
  .form {
    width: min(460px, 90vw);
    opacity: 0;
    animation: fadeUp 0.6s 0.36s forwards;
  }

  .input-row {
    display: flex;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(251,146,60,0.2);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    backdrop-filter: blur(16px);
  }
  .input-row:focus-within {
    border-color: rgba(251,146,60,0.55);
    box-shadow: 0 0 0 4px rgba(251,146,60,0.07), 0 0 40px rgba(251,146,60,0.12);
  }

  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    padding: 1.1rem 1.25rem;
    font-family: 'Syne Mono', monospace;
    font-size: 0.78rem;
    color: #fff;
    letter-spacing: 0.02em;
  }
  input[type="text"]::placeholder { color: rgba(255,255,255,0.18); }

  /* ── BUTTON ─────────────────────────────────────────────────────────────── */
  .btn {
    background: linear-gradient(135deg, #fb923c, #ea580c);
    border: none;
    padding: 0.85rem 1.5rem;
    margin: 0.3rem;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; gap: 0.45rem;
    white-space: nowrap;
    letter-spacing: -0.01em;
    box-shadow: 0 4px 20px rgba(251,146,60,0.3);
    position: relative; overflow: hidden;
    transition: box-shadow 0.3s, transform 0.2s;
    isolation: isolate;
  }
  .btn::after {
    content: '';
    position: absolute;
    bottom: -60%; left: 50%;
    transform: translateX(-50%) scale(0);
    width: 160%; padding-bottom: 160%;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    transition: transform 0.55s cubic-bezier(0.23,1,0.32,1), bottom 0.55s cubic-bezier(0.23,1,0.32,1);
    z-index: 0;
  }
  .btn::before {
    content: '';
    position: absolute;
    top: -100%; left: -60%;
    width: 40%; height: 300%;
    background: linear-gradient(105deg, transparent 0%, rgba(255,255,255,0.28) 50%, transparent 100%);
    transform: skewX(-20deg);
    transition: left 0s;
    z-index: 1; pointer-events: none;
  }
  .btn:hover:not(:disabled)::after { bottom: -20%; transform: translateX(-50%) scale(1); }
  .btn:hover:not(:disabled)::before { left: 130%; transition: left 0.55s ease; }
  .btn:hover:not(:disabled) {
    box-shadow: 0 0 0 3px rgba(251,146,60,0.25), 0 12px 40px rgba(251,146,60,0.55), 0 0 80px rgba(251,146,60,0.15);
    transform: translateY(-2px);
  }
  .btn:active:not(:disabled) { transform: scale(0.95) translateY(0); box-shadow: 0 2px 10px rgba(251,146,60,0.3); transition: transform 0.08s, box-shadow 0.08s; }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn > * { position: relative; z-index: 2; }

  .btn-icon-wrap {
    display: flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; position: relative; overflow: hidden;
  }
  .btn:hover:not(:disabled) #btnIcon { animation: arrowBounce 0.5s cubic-bezier(0.36,0.07,0.19,0.97) both; }
  @keyframes arrowBounce {
    0%  { transform:translateY(0); }
    20% { transform:translateY(-5px); }
    50% { transform:translateY(3px); }
    70% { transform:translateY(-2px); }
    100%{ transform:translateY(0); }
  }

  .eq-bars { display: none; align-items: flex-end; gap: 2px; height: 14px; }
  .eq-bar { width: 3px; border-radius: 2px; background: #fff; transform-origin: bottom; }
  .eq-bar:nth-child(1) { animation: eqPulse 0.55s 0.00s ease-in-out infinite alternate; }
  .eq-bar:nth-child(2) { animation: eqPulse 0.55s 0.11s ease-in-out infinite alternate; }
  .eq-bar:nth-child(3) { animation: eqPulse 0.55s 0.22s ease-in-out infinite alternate; }
  .eq-bar:nth-child(4) { animation: eqPulse 0.55s 0.07s ease-in-out infinite alternate; }
  @keyframes eqPulse { from { height:3px; } to { height:14px; } }
  .btn.loading .btn-icon-wrap #btnIcon { display: none; }
  .btn.loading .eq-bars { display: flex; }
  .btn.loading .btn-label { opacity:0.6; letter-spacing:0.08em; }

  /* ── STATUS TOAST ──────────────────────────────────────────────────────── */
  .status {
    font-family: 'Syne Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    padding: 0.65rem 1rem;
    border-radius: 10px;
    margin-top: 0.75rem;
    text-align: left;
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
  }
  .status.show {
    animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards,
               toastOut 0.4s ease 2.6s forwards;
  }
  @keyframes toastIn { to { opacity:1; transform:translateY(0); } }
  @keyframes toastOut { to { opacity:0; transform:translateY(-4px); } }
  .success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; }
  .error   { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  color: #fca5a5; }

  /* ── PARTICLE ─────────────────────────────────────────────────────────── */
  .particle { position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999; will-change: transform, opacity; }

  /* ══════════════════════════════════════════════════════════════════════════
     PLAYER CARD
  ══════════════════════════════════════════════════════════════════════════ */
  .player-wrap {
    width: min(460px, 90vw);
    margin-top: 1.5rem;
    opacity: 0;
    transform: translateY(24px) scale(0.97);
    pointer-events: none;
    transition: opacity 0.5s cubic-bezier(0.34,1.2,0.64,1),
                transform 0.5s cubic-bezier(0.34,1.2,0.64,1);
  }
  .player-wrap.show {
    opacity: 1;
    transform: none;
    pointer-events: all;
  }

  .player-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(251,146,60,0.18);
    border-radius: 20px;
    backdrop-filter: blur(24px);
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(251,146,60,0.06);
  }

  /* top row: cover + info */
  .player-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.1rem 1.2rem;
  }

  .cover-wrap {
    position: relative;
    flex-shrink: 0;
    width: 68px; height: 68px;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(251,146,60,0.08);
    border: 1px solid rgba(251,146,60,0.15);
  }
  .cover-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .cover-img.loaded { opacity: 1; }
  .cover-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(251,146,60,0.3);
    font-size: 1.6rem;
  }
  /* spinning vinyl ring when playing */
  .cover-spin {
    position: absolute; inset: -3px;
    border-radius: 14px;
    border: 2px solid transparent;
    border-top-color: rgba(251,146,60,0.7);
    border-right-color: rgba(251,146,60,0.3);
    opacity: 0;
    transition: opacity 0.3s;
    animation: spinRing 1.5s linear infinite;
  }
  .playing .cover-spin { opacity: 1; }
  @keyframes spinRing { to { transform: rotate(360deg); } }

  .track-info {
    flex: 1;
    min-width: 0;
    text-align: left;
  }
  .track-id {
    font-family: 'Syne Mono', monospace;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-label {
    font-size: 0.95rem;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: -0.02em;
    margin-bottom: 0.15rem;
  }
  .track-source {
    font-family: 'Syne Mono', monospace;
    font-size: 0.6rem;
    color: rgba(251,146,60,0.5);
    letter-spacing: 0.04em;
  }

  /* ── WAVEFORM BAR VISUALIZER ─────────────────────────────────────────── */
  .waveform {
    padding: 0 1.2rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 2px;
    height: 36px;
    cursor: pointer;
    position: relative;
  }
  .wv-bar {
    flex: 1;
    border-radius: 2px;
    background: rgba(251,146,60,0.18);
    transition: background 0.15s;
    min-width: 2px;
  }
  .wv-bar.played { background: rgba(251,146,60,0.75); }
  .wv-bar.active { background: #fb923c; box-shadow: 0 0 6px rgba(251,146,60,0.6); }

  /* ── PROGRESS ROW ─────────────────────────────────────────────────────── */
  .progress-row {
    padding: 0 1.2rem;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .time-label {
    font-family: 'Syne Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.04em;
    min-width: 34px;
  }
  .time-label.right { text-align: right; }

  .progress-bar-wrap {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ea580c, #fb923c);
    border-radius: 2px;
    transition: width 0.1s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -4px; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    background: #fb923c;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(251,146,60,0.8);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .progress-bar-wrap:hover .progress-fill::after { opacity: 1; }

  /* ── CONTROLS ─────────────────────────────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1.2rem 1.1rem;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    padding: 0.4rem;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s, transform 0.15s;
  }
  .ctrl-btn:hover { color: #fff; background: rgba(255,255,255,0.06); transform: scale(1.1); }
  .ctrl-btn:active { transform: scale(0.93); }

  .play-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fb923c, #ea580c);
    color: #fff;
    box-shadow: 0 4px 16px rgba(251,146,60,0.4);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .play-btn:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(251,146,60,0.6); }
  .play-btn:active { transform: scale(0.95); }

  .dl-btn {
    background: rgba(251,146,60,0.1);
    border: 1px solid rgba(251,146,60,0.25);
    color: #fb923c;
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    padding: 0.5rem 1rem;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; gap: 0.35rem;
    transition: background 0.2s, border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .dl-btn:hover {
    background: rgba(251,146,60,0.18);
    border-color: rgba(251,146,60,0.5);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(251,146,60,0.2);
  }
  .dl-btn:active { transform: scale(0.95) translateY(0); }

  .volume-wrap {
    display: flex; align-items: center; gap: 0.4rem;
  }
  .volume-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 56px; height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fb923c;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(251,146,60,0.5);
  }

  /* footer */
  .footer {
    position: fixed; bottom: 1.5rem;
    font-family: 'Syne Mono', monospace;
    font-size: 0.62rem;
    color: rgba(255,255,255,0.12);
    letter-spacing: 0.08em;
    z-index: 10;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }

  /* ── dynamic theme vars (overridden by JS) ─────────────────────────── */
  :root {
    --a1: #fb923c;
    --a2: #ea580c;
    --a3: #fed7aa;
    --a1r: 251; --a1g: 146; --a1b: 60;
  }
</style>
<style id="dynTheme"></style>
</head>
<body>

<div class="glow-bg"></div>
<div class="cover-blur" id="coverBlur"></div>
<canvas id="stars"></canvas>

<div class="center">
  <div class="wave" id="wave"></div>
  <h1><span class="suno">Suno</span><span class="load">Load</span></h1>
  <p class="sub">Independent tool &mdash; not affiliated with Suno AI &mdash; no copyrighted content is stored or distributed</p>

  <div class="form">
    <div class="input-row">
      <input type="text" id="url" placeholder="suno.com/song/... or /s/...">
      <button class="btn" id="downloadBtn">
        <span class="btn-icon-wrap">
          <svg id="btnIcon" width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="eq-bars">
            <span class="eq-bar"></span><span class="eq-bar"></span>
            <span class="eq-bar"></span><span class="eq-bar"></span>
          </span>
        </span>
        <span class="btn-label">Load</span>
      </button>
    </div>
    <div id="statusMessage" class="status"></div>
  </div>

  <!-- ── PLAYER ─────────────────────────────────────────────────────────── -->
  <div class="player-wrap" id="playerWrap">
    <div class="player-card" id="playerCard">
      <!-- top -->
      <div class="player-top">
        <div class="cover-wrap" id="coverWrap">
          <div class="cover-placeholder">♪</div>
          <img class="cover-img" id="coverImg" alt="cover">
          <div class="cover-spin"></div>
        </div>
        <div class="track-info">
          <div class="track-id" id="trackId">—</div>
          <div class="track-label">Suno Track</div>
          <div class="track-source">cdn1.suno.ai</div>
        </div>
      </div>

      <!-- waveform -->
      <div class="waveform" id="waveform"></div>

      <!-- progress -->
      <div class="progress-row">
        <span class="time-label" id="timeCur">0:00</span>
        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time-label right" id="timeDur">—:——</span>
      </div>

      <!-- controls -->
      <div class="controls">
        <!-- volume -->
        <div class="volume-wrap">
          <button class="ctrl-btn" id="muteBtn" title="Mute">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M11 5L6 9H2v6h4l5 4V5zM19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1">
        </div>

        <!-- play/pause -->
        <button class="play-btn" id="playBtn">
          <svg id="playIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
          <svg id="pauseIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>

const canvas = document.getElementById('stars');
const ctx    = canvas.getContext('2d');
let W, H, stars = [];
const resize = () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; };
const initStars = () => {
  stars = [];
  for (let i = 0; i < 160; i++) stars.push({ x: Math.random()*W, y: Math.random()*H, r: 0.3+Math.random()*1.8, op: 0.1+Math.random()*0.6, speed: 0.2+Math.random()*0.5, dir: Math.random()*Math.PI*2, pulse: Math.random()*Math.PI*2, pulseSpeed: 0.01+Math.random()*0.02, orange: Math.random()>0.6 });

const drawStars = () => {
  ctx.clearRect(0,0,W,H);
  stars.forEach(s => {
    s.pulse += s.pulseSpeed;
    const opacity = s.op*(0.5+0.5*Math.sin(s.pulse));
    if (s.orange) {
      const [r,g,b] = accentRgb;
      const grd = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);
      grd.addColorStop(0,`rgba(${r},${g},${b},${opacity*0.5})`);

      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r*4,0,Math.PI*2); ctx.fill();
      const [lr,lg,lb] = accentLightRgb;
      ctx.fillStyle = `rgba(${lr},${lg},${lb},${opacity})`;

    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();

// ══════════════════════════════════════════════════════════════════════════════
// AUDIO ENGINE
// ══════════════════════════════════════════════════════════════════════════════
let audioCtx = null;
const getAudioCtx = () => {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
};
let masterGain = null;
const getMaster = () => {
  const ac = getAudioCtx();
  if (!masterGain) { masterGain = ac.createGain(); masterGain.gain.value=0.55; masterGain.connect(ac.destination); }
  return masterGain;
};
const osc = (freq,type,start,duration,vol,freqEnd=null) => {
  const ac=getAudioCtx(), o=ac.createOscillator(), g=ac.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,start);
  if (freqEnd!==null) o.frequency.exponentialRampToValueAtTime(freqEnd,start+duration);
  g.gain.setValueAtTime(0.0001,start); g.gain.linearRampToValueAtTime(vol,start+0.008); g.gain.exponentialRampToValueAtTime(0.0001,start+duration);
  o.connect(g); g.connect(getMaster()); o.start(start); o.stop(start+duration+0.02);
};
const noise = (duration,vol,start,filterFreq=2000,filterQ=1) => {
  const ac=getAudioCtx(), size=ac.sampleRate*duration, buf=ac.createBuffer(1,size,ac.sampleRate), data=buf.getChannelData(0);
  for (let i=0;i<size;i++) data[i]=Math.random()*2-1;
  const src=ac.createBufferSource(); src.buffer=buf;
  const filt=ac.createBiquadFilter(); filt.type='bandpass'; filt.frequency.setValueAtTime(filterFreq,start); filt.Q.value=filterQ;
  const g=ac.createGain(); g.gain.setValueAtTime(vol,start); g.gain.exponentialRampToValueAtTime(0.0001,start+duration);
  src.connect(filt); filt.connect(g); g.connect(getMaster()); src.start(start); src.stop(start+duration+0.01);
};
const sfxHover   = () => { const ac=getAudioCtx(),now=ac.currentTime; osc(1320,'sine',now,0.18,0.06); osc(2640,'sine',now,0.10,0.02); };
const sfxClick   = () => { const ac=getAudioCtx(),now=ac.currentTime; osc(120,'sine',now,0.09,0.22,60); osc(520,'triangle',now,0.05,0.14,320); noise(0.04,0.08,now,1800,3); };
const sfxWhoosh  = () => {
  const ac=getAudioCtx(),now=ac.currentTime;
  osc(180,'sine',now,0.35,0.16,740); osc(360,'sine',now,0.35,0.08,1480);
  const size=Math.ceil(ac.sampleRate*0.35),buf=ac.createBuffer(1,size,ac.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<size;i++) d[i]=Math.random()*2-1;
  const src=ac.createBufferSource(); src.buffer=buf;
  const filt=ac.createBiquadFilter(); filt.type='highpass'; filt.frequency.setValueAtTime(200,now); filt.frequency.exponentialRampToValueAtTime(3400,now+0.35);
  const g=ac.createGain(); g.gain.setValueAtTime(0.0001,now); g.gain.linearRampToValueAtTime(0.07,now+0.04); g.gain.exponentialRampToValueAtTime(0.0001,now+0.35);
  src.connect(filt); filt.connect(g); g.connect(getMaster()); src.start(now); src.stop(now+0.4);
};
const sfxSuccess = () => {
  const ac=getAudioCtx(),now=ac.currentTime;
  [523.25,659.25,783.99,1046.5].forEach((freq,i)=>{
    const t=now+i*0.11; osc(freq,'sine',t,0.55,0.18); osc(freq*2,'sine',t,0.20,0.04); osc(freq*0.5,'triangle',t,0.40,0.06);
  });
  [523.25,659.25,783.99].forEach(f=>osc(f,'sine',now+0.45,0.8,0.07));

};
const sfxError   = () => {

const sfxFocus   = () => { const ac=getAudioCtx(),now=ac.currentTime; osc(1760,'sine',now,0.22,0.04); osc(2217,'sine',now+0.04,0.16,0.02); };
const sfxIntro   = () => {

// RGB → HSL
const rgbToHsl = (r,g,b) => {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if (max===min) { h=s=0; }
  else {
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){ case r:h=((g-b)/d+(g<b?6:0))/6;break; case g:h=((b-r)/d+2)/6;break; default:h=((r-g)/d+4)/6; }
  }
  return [h*360, s*100, l*100];
};

// HSL → hex
const hslToHex = (h,s,l) => {
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12; const c=l-a*Math.max(Math.min(k-3,9-k,1),-1); return Math.round(255*c).toString(16).padStart(2,'0'); };
  return '#'+f(0)+f(8)+f(4);
};

// HSL → rgb array
const hslToRgb = (h,s,l) => {
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{ const k=(n+h/30)%12; return Math.round(255*(l-a*Math.max(Math.min(k-3,9-k,1),-1))); };
  return [f(0),f(8),f(4)];
};

const extractAndApplyTheme = (img) => {
  try {
    const cv = document.createElement('canvas');
    cv.width = cv.height = 60;
    const cx = cv.getContext('2d');
    cx.drawImage(img, 0, 0, 60, 60);
    const data = cx.getImageData(0, 0, 60, 60).data;

    // collect saturated, mid-brightness pixels
    let rS=0,gS=0,bS=0,cnt=0;
    for (let i=0;i<data.length;i+=4) {
      const r=data[i],g=data[i+1],b=data[i+2];
      const br=(r+g+b)/3;
      const sat=Math.max(r,g,b)-Math.min(r,g,b);
      if (br>35 && br<215 && sat>40) { rS+=r;gS+=g;bS+=b;cnt++; }
    }
    if (!cnt) return; // keep default orange

    const [h,s,l] = rgbToHsl(Math.round(rS/cnt), Math.round(gS/cnt), Math.round(bS/cnt));

    // clamp: boost saturation, keep lightness comfortable
    const hs = Math.max(s, 55);
    const hl = Math.min(Math.max(l, 42), 62);

    const main  = hslToHex(h, hs,     hl);
    const dark  = hslToHex(h, hs+5,   Math.max(hl-16,25));
    const light = hslToHex(h, hs-12,  Math.min(hl+28,88));
    const mid   = hslToHex(h, hs,     Math.min(hl+8,70));

    const [mr,mg,mb]   = hslToRgb(h, hs, hl);
    const [dr,dg,db]   = hslToRgb(h, hs+5, Math.max(hl-16,25));
    const [lr2,lg2,lb2]= hslToRgb(h, hs-12, Math.min(hl+28,88));

    // update canvas star color
    accentRgb      = [mr,mg,mb];
    accentLightRgb = [lr2,lg2,lb2];

    // body bg — very dark tint of hue
    const bgHex = hslToHex(h, Math.min(hs,30), 4);

    // inject CSS overrides
    dynTheme.textContent = `
      :root {
        --c1:${main}; --c2:${mid}; --c3:${dark};
        --c-glow:rgba(${mr},${mg},${mb},0.4);
        --c-glow2:rgba(${dr},${dg},${db},0.12);
        --c-glow3:rgba(${mr},${mg},${mb},0.05);
        --c-ring1:rgba(${mr},${mg},${mb},0.15);
        --c-border:rgba(${mr},${mg},${mb},0.22);
        --c-border-focus:rgba(${mr},${mg},${mb},0.6);
        --c-shadow:rgba(${mr},${mg},${mb},0.35);
        --c-shadow2:rgba(${mr},${mg},${mb},0.6);
        --c-shadow3:rgba(${mr},${mg},${mb},0.15);
        --c-wv-played:rgba(${mr},${mg},${mb},0.75);
        --c-wv-active:${main};
        --c-wv-glow:rgba(${mr},${mg},${mb},0.6);
        --c-btn-bg1:${main}; --c-btn-bg2:${dark};
        --c-progress1:${dark}; --c-progress2:${main};
        --c-play-bg:rgba(${mr},${mg},${mb},0.12);
        --c-play-border:rgba(${mr},${mg},${mb},0.3);
        --c-play-glow:rgba(${mr},${mg},${mb},0.35);
        --c-dl-border:rgba(${mr},${mg},${mb},0.25);
        --c-dl-text:${main};
        --c-dl-bg:rgba(${mr},${mg},${mb},0.08);
        --c-dl-bg2:rgba(${mr},${mg},${mb},0.15);
        --c-card-border:rgba(${mr},${mg},${mb},0.2);
        --c-cover-bg:rgba(${mr},${mg},${mb},0.08);
        --c-cover-border:rgba(${mr},${mg},${mb},0.15);
        --c-sub:rgba(${mr},${mg},${mb},0.3);
        --c-source:rgba(${mr},${mg},${mb},0.5);
        --c-spin1:rgba(${mr},${mg},${mb},0.7);
        --c-spin2:rgba(${mr},${mg},${mb},0.3);
      }
      body { background: ${bgHex}; transition: background 1.2s ease; }
      h1 .load {
        background: linear-gradient(90deg, ${main}, ${mid}, ${dark}) !important;
        -webkit-background-clip: text !important;
        background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
      }
    `;
  } catch(e) { /* keep default */ }
};

const resetTheme = () => {

const showStatus = (type, msg) => {

const keyFreqs=[1047,1175,1319,1397,1568,1760,1976];
urlInput.addEventListener('keydown', e => {
  if (e.key==='Enter') return;
  const ac=getAudioCtx(),now=ac.currentTime,f=keyFreqs[Math.floor(Math.random()*keyFreqs.length)];
  osc(f,'sine',now,0.05,0.018); noise(0.025,0.018,now,2800,4);
});

// ── validation ───────────────────────────────────────────────────────────────
const validateUrl = url => {
  try {
    const p=new URL(url);
    if (!p.hostname.endsWith('suno.com')) return false;
    const parts=p.pathname.split('/').filter(Boolean);
    if (parts[0]==='s') return parts.length===2;
    if (parts[0]==='song') { if(parts.length!==2) return false; if(!/^[a-z0-9\-]+$/i.test(parts[1])) return false; if(!p.searchParams.has('sh')) return false; return true; }
    return false;
  } catch(e){ return false; }
};
const sendShortLinkToServer = async url => {
  const r=await fetch('/api/get_full_url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
  if(!r.ok) throw new Error('Network error while resolving link');
  const data=await r.json();
  if(data.error) throw new Error(data.error);
  return data.full_url;
};
const extractIdFromUrl = async url => {
  const p=new URL(url), parts=p.pathname.split('/').filter(Boolean);
  if(parts[0]==='s'&&parts.length===2) return extractIdFromUrl(await sendShortLinkToServer(url));
  if(parts[0]==='song') return parts[1];
  return null;
};

// ── load track ───────────────────────────────────────────────────────────────
const loadTrack = async () => {
  playIntro(); sfxClick();
  const url = urlInput.value.trim();
  if (!url) { showStatus('error','enter a url first'); return; }
  if (!validateUrl(url)) { showStatus('error','need suno.com/song/... or suno.com/s/...'); return; }

  sfxWhoosh();
  downloadBtn.classList.add('loading');
  downloadBtn.disabled = true;

  try {
    const id = await extractIdFromUrl(url);
    if (!id) throw new Error('could not extract track id');
    currentId = id;

    // set audio
    audioEl.src = `https://cdn1.suno.ai/${id}.mp3`;
    audioEl.load();

    // set cover — try jpeg then png
    const imgUrl = `https://cdn2.suno.ai/image_${id}.jpeg`;
    coverImg.crossOrigin = 'anonymous';
    coverImg.onload = () => {
      coverImg.classList.add('loaded');
      currentCoverUrl = imgUrl;
      coverBlur.style.backgroundImage = `url(${imgUrl})`;
      coverBlur.classList.add('show');
      extractAndApplyTheme(coverImg);
    };
    coverImg.onerror = () => {
      const png = `https://cdn2.suno.ai/image_${id}.png`;
      coverImg.onload = () => {
        coverImg.classList.add('loaded');
        currentCoverUrl = png;
        coverBlur.style.backgroundImage=`url(${png})`;
        coverBlur.classList.add('show');
        extractAndApplyTheme(coverImg);
      };
      coverImg.onerror = () => {}; // keep placeholder
      coverImg.src = png;
    };
    coverImg.src = imgUrl;

    // track id label
    trackIdEl.textContent = id.length > 24 ? id.slice(0,11)+'…'+id.slice(-8) : id;

    // reset player state
    progressFill.style.width='0%';
    timeCurEl.textContent='0:00';
    timeDurEl.textContent='—:——';
    playIcon.style.display='block'; pauseIcon.style.display='none';
    coverWrap.classList.remove('playing');
    updateWaveform(0);

    // show player
    playerWrap.classList.add('show');
    showStatus('success','🎵 track loaded');

  } catch(err) {
    showStatus('error', err.message || 'something went wrong');
  } finally {
    downloadBtn.classList.remove('loading');
    downloadBtn.disabled = false;
  }
};

downloadBtn.addEventListener('click', loadTrack);
urlInput.addEventListener('keypress', e => { if(e.key==='Enter') loadTrack(); });

// ── hide player the moment URL changes ───────────────────────────────────────
urlInput.addEventListener('input', () => {
  if (!playerWrap.classList.contains('show')) return;
  playerWrap.classList.remove('show');
  coverBlur.classList.remove('show');
  coverBlur.style.backgroundImage = '';
  audioEl.pause();
  audioEl.src = '';
  currentId = null;
  coverImg.classList.remove('loaded');
  coverImg.src = '';
  coverWrap.classList.remove('playing');
  playIcon.style.display = 'block';
  pauseIcon.style.display = 'none';
  progressFill.style.width = '0%';
  timeCurEl.textContent = '0:00';
  timeDurEl.textContent = '—:——';
  updateWaveform(0);
});

document.getElementById("url").value = window.location.href.replace("ssuno","suno");
</script>
