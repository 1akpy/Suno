<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SunoLoad</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0602;
    font-family: 'Syne', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: none;
  }

  /* cursor */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: #fb923c;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 12px #fb923c, 0 0 24px rgba(251,146,60,0.4);
    transition: transform 0.1s;
  }

  /* orange ambient bg */
  .glow-bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 65% 55% at 15% 20%, rgba(251,146,60,0.15) 0%, transparent 65%),
      radial-gradient(ellipse 50% 50% at 85% 80%, rgba(234,88,12,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(251,146,60,0.05) 0%, transparent 70%);
    animation: breathe 8s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes breathe {
    0%   { opacity: 0.7; }
    100% { opacity: 1; }
  }

  /* stars canvas */
  canvas {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  /* main */
  .center {
    position: relative; z-index: 10;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
    padding: 2rem;
    gap: 0;
  }

  /* wave */
  .wave {
    display: flex; align-items: center; gap: 3px;
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s forwards;
  }

  .wave-bar {
    width: 3px; border-radius: 2px;
    background: linear-gradient(to top, #ea580c, #fb923c, #fed7aa);
    animation: waveAnim var(--d) ease-in-out infinite alternate;
    opacity: 0.7;
  }

  @keyframes waveAnim {
    from { transform: scaleY(0.15); }
    to   { transform: scaleY(1); }
  }

  /* title */
  h1 {
    font-size: clamp(3.5rem, 12vw, 6.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.05em;
    margin-bottom: 0.6rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }

  h1 .suno { color: #fff; }
  h1 .load {
    background: linear-gradient(90deg, #fb923c, #f97316, #ea580c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200%;
    animation: gradShift 3s ease-in-out infinite alternate;
  }

  @keyframes gradShift {
    0%   { background-position: 0%; }
    100% { background-position: 100%; }
  }

  .sub {
    font-family: 'Syne Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.6s 0.28s forwards;
  }

  /* form */
  .form {
    width: min(460px, 90vw);
    opacity: 0;
    animation: fadeUp 0.6s 0.36s forwards;
  }

  .input-row {
    display: flex;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(251,146,60,0.2);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
    backdrop-filter: blur(16px);
  }

  .input-row:focus-within {
    border-color: rgba(251,146,60,0.55);
    box-shadow: 0 0 0 4px rgba(251,146,60,0.07), 0 0 40px rgba(251,146,60,0.12);
  }

  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    padding: 1.1rem 1.25rem;
    font-family: 'Syne Mono', monospace;
    font-size: 0.78rem;
    color: #fff;
    letter-spacing: 0.02em;
  }

  input[type="text"]::placeholder { color: rgba(255,255,255,0.18); }

  .btn {
    background: linear-gradient(135deg, #fb923c, #ea580c);
    border: none;
    padding: 0.85rem 1.5rem;
    margin: 0.3rem;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
    cursor: none;
    display: flex; align-items: center; gap: 0.45rem;
    transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
    white-space: nowrap;
    letter-spacing: -0.01em;
    box-shadow: 0 4px 20px rgba(251,146,60,0.3);
    position: relative; overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover:not(:disabled) {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 30px rgba(251,146,60,0.5);
    filter: brightness(1.1);
  }

  .btn:hover:not(:disabled)::before { opacity: 1; }
  .btn:active:not(:disabled) { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.65s linear infinite;
    display: none;
  }

  .status {
    font-family: 'Syne Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    padding: 0.65rem 1rem;
    border-radius: 10px;
    display: none;
    margin-top: 0.75rem;
    text-align: left;
  }

  .success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; }
  .error   { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  color: #fca5a5; }

  .footer {
    position: fixed; bottom: 1.5rem;
    font-family: 'Syne Mono', monospace;
    font-size: 0.62rem;
    color: rgba(255,255,255,0.12);
    letter-spacing: 0.08em;
    z-index: 10;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(18px); }
    to   { opacity:1; transform: none; }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="glow-bg"></div>
<canvas id="stars"></canvas>

<div class="center">
  <div class="wave" id="wave"></div>

  <h1><span class="suno">Suno</span><span class="load">Load</span></h1>
  <p class="sub">paste · grab · done</p>

  <div class="form">
    <div class="input-row">
      <input type="text" id="url" placeholder="suno.com/song/... or /s/...">
      <button class="btn" id="downloadBtn">
        <span class="spinner" id="spinner"></span>
        <svg id="btnIcon" width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download
      </button>
    </div>
    <div id="statusMessage" class="status"></div>
  </div>
</div>

<p class="footer">not affiliated with suno inc.</p>

<script>
  // ── cursor ──────────────────────────────────────────────────────────────────
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });

  // ── waveform ────────────────────────────────────────────────────────────────
  const waveEl = document.getElementById('wave');
  for (let i = 0; i < 32; i++) {
    const b = document.createElement('div');
    b.className = 'wave-bar';
    b.style.height = (6 + Math.random() * 36) + 'px';
    b.style.setProperty('--d', (0.5 + Math.random() * 1) + 's');
    b.style.animationDelay = (-Math.random() * 2) + 's';
    waveEl.appendChild(b);
  }

  // ── stars ───────────────────────────────────────────────────────────────────
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');

  let W, H, stars = [];

  const resize = () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  };

  const initStars = () => {
    stars = [];
    for (let i = 0; i < 160; i++) {
      stars.push({
        x:    Math.random() * W,
        y:    Math.random() * H,
        r:    0.3 + Math.random() * 1.8,
        op:   0.1 + Math.random() * 0.6,
        speed: 0.2 + Math.random() * 0.5,
        dir:  Math.random() * Math.PI * 2,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 0.01 + Math.random() * 0.02,
        orange: Math.random() > 0.6
      });
    }
  };

  const drawStars = () => {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.pulse += s.pulseSpeed;
      const opacity = s.op * (0.5 + 0.5 * Math.sin(s.pulse));

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);

      if (s.orange) {
        ctx.fillStyle = `rgba(251,146,60,${opacity})`;
        // glow
        const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 4);
        grd.addColorStop(0, `rgba(251,146,60,${opacity * 0.5})`);
        grd.addColorStop(1, 'rgba(251,146,60,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,200,100,${opacity})`;
      } else {
        ctx.fillStyle = `rgba(255,255,255,${opacity})`;
      }

      ctx.fill();

      s.x += Math.cos(s.dir) * s.speed * 0.3;
      s.y += Math.sin(s.dir) * s.speed * 0.3;

      if (s.x < -10) s.x = W + 10;
      if (s.x > W + 10) s.x = -10;
      if (s.y < -10) s.y = H + 10;
      if (s.y > H + 10) s.y = -10;
    });
    requestAnimationFrame(drawStars);
  };

  resize();
  initStars();
  drawStars();
  window.addEventListener('resize', () => { resize(); initStars(); });

  // ── logic (original) ────────────────────────────────────────────────────────
  const urlInput      = document.getElementById('url');
  const downloadBtn   = document.getElementById('downloadBtn');
  const spinner       = document.getElementById('spinner');
  const btnIcon       = document.getElementById('btnIcon');
  const statusMessage = document.getElementById('statusMessage');

  document.getElementById("url").value = window.location.href.replace("ssuno", "suno");

  const validateUrl = (url) => {
    try {
      const parsedUrl = new URL(url);
      if (!parsedUrl.hostname.endsWith('suno.com')) return false;
      const pathParts = parsedUrl.pathname.split('/').filter(Boolean);
      if (pathParts[0] === 's') return pathParts.length === 2;
      if (pathParts[0] === 'song') {
        if (pathParts.length !== 2) return false;
        if (!/^[a-z0-9\-]+$/i.test(pathParts[1])) return false;
        if (!parsedUrl.searchParams.has('sh')) return false;
        return true;
      }
      return false;
    } catch (e) { return false; }
  };

  const sendShortLinkToServer = async (url) => {
    try {
      const response = await fetch('/api/get_full_url', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      if (!response.ok) throw new Error('Network error while resolving link');
      const data = await response.json();
      if (data.error) throw new Error(data.error);
      return data.full_url;
    } catch (error) {
      throw new Error(`Short link error: ${error.message}`);
    }
  };

  const extractIdFromUrl = async (url) => {
    try {
      const parsedUrl = new URL(url);
      const pathParts = parsedUrl.pathname.split('/').filter(Boolean);
      if (pathParts[0] === 's' && pathParts.length === 2) {
        const fullUrl = await sendShortLinkToServer(url);
        return extractIdFromUrl(fullUrl);
      }
      if (pathParts[0] === 'song') return pathParts[1];
      return null;
    } catch (e) {
      throw new Error(`ID extraction error: ${e.message}`);
    }
  };

  const showStatusMessage = (type, message) => {
    statusMessage.style.display = 'block';
    statusMessage.textContent = message;
    statusMessage.className = 'status ' + (type === 'success' ? 'success' : 'error');
  };

  const handleDownload = async () => {
    const url = urlInput.value.trim();
    if (!url) { showStatusMessage('error', 'enter a url first'); return; }
    if (!validateUrl(url)) {
      showStatusMessage('error', 'need suno.com/song/... or suno.com/s/...');
      return;
    }
    spinner.style.display = 'inline-block';
    btnIcon.style.display = 'none';
    downloadBtn.disabled  = true;
    statusMessage.style.display = 'none';

    try {
      const id = await extractIdFromUrl(url);
      if (!id) throw new Error('could not extract track id');
      const link = document.createElement('a');
      link.href = `https://cdn1.suno.ai/${id}.mp3`;
      link.download = `${id}.mp3`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showStatusMessage('success', '🎵 download started');
    } catch (error) {
      showStatusMessage('error', error.message || 'something went wrong');
    } finally {
      spinner.style.display = 'none';
      btnIcon.style.display = 'block';
      downloadBtn.disabled  = false;
    }
  };

  downloadBtn.addEventListener('click', handleDownload);
  urlInput.addEventListener('input', () => { statusMessage.style.display = 'none'; });
  urlInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleDownload(); });
</script>
</body>
</html>
